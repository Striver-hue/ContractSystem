@keyframes move {

    33% { transform: translate(120px, 60px) scale(1.1); }

}
@keyframes move-complex {

<!-- ===================== 2. 攻击事件内容展示模块 ===================== -->
<section class="py-14 px-4 bg-gray-50">
  <div class="max-w-6xl mx-auto">
    <!-- 总记录数 -->
    <div class="mb-8 text-sm text-gray-700">
        共有 <span id="record_num" class="text-primary font-bold">0</span> 条攻击事件记录
    </div>

    <!-- 事件卡片列表 -->
    <div id="event_list" class="space-y-6 mb-12">
      <div class="text-center text-gray-500 py-10">正在加载数据...</div>
    </div>

    <!-- 分页控制器 -->
    <div class="flex items-center justify-center gap-4">
      <button id="first" class="px-4 py-2 border border-gray-300 rounded hover:bg-primary hover:text-white transition">首页</button>
      <button id="prev" class="px-4 py-2 border border-gray-300 rounded hover:bg-primary hover:text-white transition">上一页</button>
      <span id="page_text" class="font-medium">第 0 页，共 0 页</span>
      <button id="next" class="px-4 py-2 border border-gray-300 rounded hover:bg-primary hover:text-white transition">下一页</button>
      <button id="last" class="px-4 py-2 border border-gray-300 rounded hover:bg-primary hover:text-white transition">尾页</button>
    </div>
  </div>
</section>

<script>
// 全局配置
let dataList = [];
let totalCount = 0;
let totalMoney = 0;
const PAGE_SIZE = 20;
let currentPage = 1;
let totalPage = 0;

// 加载Excel数据
document.addEventListener('DOMContentLoaded', async () => {
  try {
    // 读取表格文件
    const response = await fetch('./excel/merged_v1.xlsx');
    const buffer = await response.arrayBuffer();
    const workbook = XLSX.read(buffer, { type: 'array' });
    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

    // 过滤表头，获取有效数据
    dataList = rows.slice(1).filter(row => row && row.length > 0);
    totalCount = dataList.length;

    // 计算总损失金额（第4列）
    totalMoney = dataList.reduce((sum, row) => {
      const num = parseFloat(row[3] || 0);
      return sum + (isNaN(num) ? 0 : num);
    }, 0);

    // 渲染所有模块
    renderTotal();
    renderPieChart();
    renderEventCards();
    renderPagination();
  } catch (error) {
    document.getElementById('event_list').innerHTML = 
      `<div class="text-red-500 text-center py-10">数据加载失败：${error.message}</div>`;
  }
});

// 渲染统计数据
function renderTotal() {
  document.getElementById('total_count').textContent = totalCount;
  document.getElementById('total_money').textContent = totalMoney.toLocaleString();
  document.getElementById('record_num').textContent = totalCount;
}

// 注册 DataLabels 插件
Chart.register(ChartDataLabels);

function renderPieChart() {
  const typeData = {};
  dataList.forEach(row => {
    // 处理空值，如果没有则记为未知
    const type = row[4] || '未知攻击';
    typeData[type] = (typeData[type] || 0) + 1;
  });

  // 1. 按数量从大到小排序
  const sorted = Object.entries(typeData).sort((a, b) => b[1] - a[1]);
  
  // 2. 取前8个，第9个及以后的合并为“其他”
  // 这样图表里一共 8 + 1 = 9 个区块。
  const top8 = sorted.slice(0, 8);
  const rest = sorted.slice(8);
  const otherCount = rest.reduce((sum, item) => sum + item[1], 0);

  const labels = [];
  const values = [];
  
  top8.forEach(([k, v]) => { labels.push(k); values.push(v); });
  
  // 强制将“其他”最后推入数组！
  // 在 Chart.js 顺时针渲染中，这会确保它排在最后渲染，落在圆环的右下或左下方，而不是抢占左上方。
  if (otherCount > 0) { 
    labels.push('其他'); 
    values.push(otherCount); 
  }

  // 3. 计算总计数值，用于后面计算百分比
  const total = values.reduce((acc, val) => acc + val, 0);

  // 4. 定义 9 种专业、高对比度且无重叠的图表色彩 (Echarts企业级色板)
  const colors = [
    '#3B82F6', // 经典蓝
    '#10B981', // 翡翠绿
    '#F59E0B', // 琥珀黄
    '#EF4444', // 警示红
    '#8B5CF6', // 优雅紫
    '#06B6D4', // 青蓝
    '#F43F5E', // 玫瑰红
    '#84CC16', // 莱姆绿
    '#475569'  // 蓝灰（固定分配给“其他”类别，视觉降噪）
  ];

  const ctx = document.getElementById('attack_pie').getContext('2d');
  
  if (window.attackChartInstance) {
    window.attackChartInstance.destroy();
  }

  window.attackChartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: colors,
        borderWidth: 2,
        borderColor: '#0B1120', // 边框色必须与你的左侧背景色完全一致，制造完美的“切片”留白效果
        hoverOffset: 5
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '60%', // 经典的粗细比例
      layout: {
        padding: { right: 20 } // 给右侧图例留出一点空间
      },
      plugins: {
        legend: { 
          position: 'right', // 图例靠右
          align: 'center',
          labels: { 
            color: '#9CA3AF', // 柔和的文字颜色
            font: { size: 12, family: "sans-serif" },
            padding: 14,
            usePointStyle: true,
            pointStyle: 'circle' // 圆形标记更加现代
          } 
        },
        tooltip: {
          backgroundColor: 'rgba(15, 23, 42, 0.95)',
          titleColor: '#fff',
          bodyColor: '#e2e8f0',
          borderColor: '#334155',
          borderWidth: 1,
          padding: 10
        },
        // 利用刚刚引入的插件绘制图表内部的百分比
        datalabels: {
          color: '#ffffff',
          font: {
            weight: 'bold',
            size: 11
          },
          formatter: (value, context) => {
            // 核心逻辑：只显示前 7 个数据的百分比 (索引 0~6)
            if (context.dataIndex < 7) {
              const percentage = ((value / total) * 100).toFixed(1) + '%';
              return percentage;
            }
            // 超过第7个（即第8个和"其他"）不显示任何文字，防止重叠拥挤
            return null; 
          },
          display: function(context) {
            return context.dataset.data[context.dataIndex] > 0; // 0值不显示
          }
        }
      }
    }
  });
}

// 新增：Excel日期格式化（修复时间不显示）
function formatExcelDate(dateValue) {
  if (!dateValue || dateValue === '-') return '-';
  if (!isNaN(dateValue)) {
    const date = new Date((dateValue - 25569) * 86400 * 1000);
    return date.toLocaleDateString();
  }
  return dateValue;
}

// 渲染事件卡片
function renderEventCards() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const end = start + PAGE_SIZE;
  const pageData = dataList.slice(start, end);
  const container = document.getElementById('event_list');

  let html = '';
  pageData.forEach(row => {
    // 列对应：0时间 1项目 2描述 3损失 4攻击手法 5链接 6来源
    const time = formatExcelDate(row[0]);
    const project = row[1] || '-';
    const desc = row[2] || '-';
    const loss = row[3] || '-';
    const attack = row[4] || '-';
    const link = row[5] || '#';
    const source = row[6] || '-';

    html += `
<div class="bg-white rounded-xl shadow-sm py-3 px-4 border border-gray-100 w-full">
  <div class="flex justify-between items-center mb-2">
    <div class="text-base font-semibold text-gray-900">项目名称：${project}</div>
    <div class="text-s text-gray-500">${time}</div>
  </div>
  <div class="border-b border-gray-200 mb-2"></div>
        <!-- 第二部分：详情 -->
        <div class="space-y-3 text-sm text-gray-700">
        <div><b class="text-gray-900">事件描述：</b>${desc}</div>
<div><b class="text-gray-900">损失金额：</b>$${loss} ｜ <b class="text-gray-900">攻击手法：</b>${attack} ｜ <b class="text-gray-900">数据来源：</b>${source}</div>
        <div>
            <a href="${link}" target="_blank" class="text-primary font-medium hover:underline text-xs">
            查看参考来源
            </a>
        </div>
        </div>
      </div>
    `;
  });

  container.innerHTML = html || '<div class="text-center text-gray-500 py-6">暂无数据</div>';
}

// 渲染分页
function renderPagination() {
  totalPage = Math.ceil(totalCount / PAGE_SIZE) || 1;
  document.getElementById('page_text').textContent = `第 ${currentPage} 页，共 ${totalPage} 页`;
}

// 分页事件
document.getElementById('first').onclick = () => { currentPage = 1; renderEventCards(); renderPagination(); };
document.getElementById('prev').onclick = () => { if(currentPage>1) currentPage--; renderEventCards(); renderPagination(); };
document.getElementById('next').onclick = () => { if(currentPage<totalPage) currentPage++; renderEventCards(); renderPagination(); };
document.getElementById('last').onclick = () => { currentPage = totalPage; renderEventCards(); renderPagination(); };
</script>
