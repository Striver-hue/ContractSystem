<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slither 合约安全检测</title>
  <!-- 引入Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入Font Awesome图标 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- 统一你的项目配置 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0F172A',
            secondary: '#2563EB',
            accent: '#10B981',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
    }
  </style>
</head>
<body class="bg-white min-h-screen">
  <div class="container mx-auto px-6 md:px-12 lg:px-20 max-w-6xl py-12 md:py-16">
    <!-- 页面标题 -->
    <div class="text-center mb-12">
      <h1 class="text-3xl md:text-4xl font-bold text-primary mb-4">Slither 智能合约安全检测</h1>
      <p class="text-gray-600 max-w-2xl mx-auto">上传 .sol 后缀的智能合约文件，一键执行安全审计，查看原始检测结果并下载报告</p>
    </div>

    <!-- 核心内容区（状态切换） -->
    <div class="bg-white rounded-xl shadow-sm p-8 md:p-10">
      <!-- 1. 上传文件状态（默认） -->
      <div id="uploadState" class="block">
        <div id="dropArea" class="border-2 border-dashed border-gray-300 rounded-xl p-10 text-center cursor-pointer hover:border-secondary transition-colors">
          <i class="fa-solid fa-file-code text-4xl text-secondary mb-4"></i>
          <p class="text-gray-700 mb-2">点击或拖拽上传 .sol 智能合约文件</p>
          <p class="text-sm text-gray-500 mb-6">仅支持 Solidity 合约文件（.sol）</p>
          <input type="file" id="fileInput" accept=".sol" class="hidden">
          <button id="uploadBtn" class="bg-secondary text-white px-6 py-3 rounded-lg font-medium hover:bg-secondary/90 transition-all">
            选择文件上传
          </button>
        </div>
      </div>

      <!-- 2. 检测中状态 -->
      <div id="loadingState" class="hidden text-center py-16">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-secondary border-t-transparent mb-6"></div>
        <h3 class="text-xl font-bold text-primary mb-2">合约检测中...</h3>
        <p class="text-gray-600">Slither 正在执行安全审计，请稍候</p>
      </div>

      <!-- 3. 检测完成状态 -->
      <div id="doneState" class="hidden">
        <div class="flex items-center justify-between mb-6">
          <h3 class="text-xl font-bold text-primary">检测完成</h3>
          <!-- 下载按钮 -->
          <button id="downloadBtn" class="bg-secondary text-white px-6 py-3 rounded-lg font-medium hover:bg-secondary/90 transition-all flex items-center gap-2">
            <i class="fa-solid fa-download"></i> 下载检测报告
          </button>
        </div>
        <!-- JSON 结果展示区 -->
        <div class="bg-gray-50 rounded-xl p-6 h-[400px] overflow-y-auto">
          <pre id="resultJson" class="text-sm text-gray-800 whitespace-pre-wrap"></pre>
        </div>
        <!-- 重新检测按钮 -->
        <button id="resetBtn" class="mt-6 border border-secondary text-secondary px-6 py-3 rounded-lg font-medium hover:bg-secondary/10 transition-all">
          重新上传检测
        </button>
      </div>
    </div>
  </div>

  <script>
    // 获取DOM元素
    const dropArea = document.getElementById('dropArea');
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadState = document.getElementById('uploadState');
    const loadingState = document.getElementById('loadingState');
    const doneState = document.getElementById('doneState');
    const resultJson = document.getElementById('resultJson');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');

    // 后端接口地址
    const API_URL = 'http://localhost:8080/slither/analyze';
    // 存储检测结果数据
    let detectResult = null;

    // 切换状态
    function showState(state) {
      uploadState.classList.add('hidden');
      loadingState.classList.add('hidden');
      doneState.classList.add('hidden');
      
      if(state === 'upload') uploadState.classList.remove('hidden');
      if(state === 'loading') loadingState.classList.remove('hidden');
      if(state === 'done') doneState.classList.remove('hidden');
    }

    // 初始化：默认显示上传状态
    showState('upload');

    // 点击上传
    uploadBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if(file) analyzeFile(file);
    });

    // 拖拽上传
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, preventDefaults, false);
    });
    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }
    ['dragenter', 'dragover'].forEach(eventName => {
      dropArea.classList.add('border-secondary', 'bg-secondary/5');
    });
    ['dragleave', 'drop'].forEach(eventName => {
      dropArea.classList.remove('border-secondary', 'bg-secondary/5');
    });
    dropArea.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files[0];
      if(file && file.name.endsWith('.sol')) analyzeFile(file);
    });

    // 核心：上传文件并检测（修复非JSON返回解析问题）
    async function analyzeFile(file) {
      showState('loading');

      const formData = new FormData();
      formData.append('file', file);

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: formData
        });

        // 🔥 关键修复：不强制解析JSON，直接获取后端返回的【原始文本内容】
        const rawText = await response.text();
        // 直接展示原始内容（无论后端返回文本/JSON/路径，都能正常显示）
        detectResult = rawText;
        resultJson.textContent = rawText;

        // 切换到完成状态
        showState('done');
      } catch (error) {
        alert('检测失败：' + error.message);
        showState('upload');
      }
    }

    // 下载报告（修复为纯文本下载）
    downloadBtn.addEventListener('click', () => {
      if(!detectResult) return;
      // 直接下载后端返回的原始内容
      const blob = new Blob([detectResult], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `slither检测报告_${new Date().getTime()}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    });

    // 重新检测
    resetBtn.addEventListener('click', () => {
      fileInput.value = '';
      detectResult = null;
      showState('upload');
    });
  </script>
</body>
</html>
