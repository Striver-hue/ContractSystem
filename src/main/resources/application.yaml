spring:
  application:
    name: ContractSystem
  datasource:
    url: jdbc:mysql://localhost:3306/contract_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  server:
    port: 8010
  jpa:
    hibernate:
      ddl-auto: update   # 自动创建/更新表结构，开发阶段方便
    show-sql: true      # 输出 SQL，方便调试
