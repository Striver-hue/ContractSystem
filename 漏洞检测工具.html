:root {

}

.background-container {

    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    overflow: hidden;
    filter: blur(120px);

}

.blob {
    position: absolute;
    border-radius: 50%;
    mix-blend-mode: multiply;
    animation: move 30s infinite alternate ease-in-out;
}
.blob-1 { width: 700px; height: 700px; top: -150px; left: -100px; background: radial-gradient(circle, var(--orange-soft) 0%, transparent 75%); }
.blob-2 { width: 600px; height: 600px; bottom: -100px; right: -50px; background: radial-gradient(circle, var(--orange-deep) 0%, transparent 75%); animation-delay: -7s; }
.blob-3 { width: 500px; height: 550px; top: 30%; left: 40%; background: radial-gradient(circle, rgba(255, 180, 0, 0.1) 0%, transparent 70%); animation: move-complex 45s infinite linear; }

@keyframes move {
    0% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(120, 60px) scale(1.1); }
    100% { transform: translate(0, 0) scale(1); }
}
@keyframes move-complex {

<div class="w-full max-w-[1440px] mx-auto flex flex-col lg:flex-row gap-8 items-start px-4 pt-12 pb-12">
  
<!-- 检测选项 模块 -->
<div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-5 relative z-50">

<!-- 右侧报告区域 -->

<style>
#report_content::-webkit-scrollbar { width: 6px; }
#report_content::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
#report_content .audit-line { @apply py-1 px-3 rounded-lg hover:bg-blue-50/50 transition-colors; }
.text-high { color: #EF4444; font-weight: 700; }
.text-medium { color: #F59E0B; font-weight: 700; }
.text-low { color: #3B82F6; font-weight: 700; }
.tab-active { @apply bg-secondary text-white !important; }
pre { white-space: pre-wrap; word-wrap: break-word; margin: 0; }

<script>
// ======================
// 本地文件路径配置
// ======================
const FILE_PATH = {
  sol: "/text/reentrance.sol",
  json: "/text/reentrance.json"
};

// ======================
// DOM元素
// ======================
const startBtn = document.getElementById("start_detect");
const fileInput = document.getElementById("upload_file");
const codeTextarea = document.getElementById("contract_code");
const reportContent = document.getElementById("report_content");
const fileNameDisplay = document.getElementById("file_name_display");
const tabCode = document.getElementById("tab_code");
const tabReport = document.getElementById("tab_report");
const toolSelect = document.getElementById("select_tool");


let isDetecting = false;
let detectTimeout = null;
let currentFileName = "";

// ======================
// 初始化
// ======================
window.addEventListener("load", () => {
  bindEvents();
});

// 绑定事件
function bindEvents() {
  startBtn.addEventListener("click", startDetect);
  fileInput.addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;
  currentFileName = file.name;
  fileNameDisplay.textContent = `已选择文件：${currentFileName}`;
  // 新增这一行 → 代码框显示文件名
  codeTextarea.value = `已选择文件：${currentFileName}`;
  resetStatus();
});
  tabCode.addEventListener("click", () => showContent("code"));
  tabReport.addEventListener("click", () => showContent("report"));
}

// 重置状态
function resetStatus() {
  isDetecting = false;
  clearTimeout(detectTimeout);

  startBtn.disabled = false;
  startBtn.innerHTML = '<i class="fa-solid fa-play"></i> 开始安全检测';
  startBtn.className = "w-full py-3 rounded-lg bg-secondary text-white text-sm font-medium flex items-center justify-center gap-2 hover:bg-blue-700 transition-colors shadow-md shadow-blue-500/20";

  tabCode.disabled = true;
  tabReport.disabled = true;
  tabCode.className = "px-3 py-1 rounded text-xs font-medium bg-gray-100 text-gray-400 cursor-not-allowed";
  tabReport.className = "px-3 py-1 rounded text-xs font-medium bg-gray-100 text-gray-400 cursor-not-allowed";
}

// 开始检测
function startDetect() {
  if(!currentFileName){
    reportContent.innerHTML = '<span class="text-red-500">请先上传文件！</span>';
    return;
  }
  if(currentFileName !== "reentrance.sol"){
    reportContent.innerHTML = '<span class="text-red-500">当前仅支持 reentrance.sol 检测</span>';
    return;
  }
  if(isDetecting) return;

  isDetecting = true;
  const tool = toolSelect.value;

  startBtn.disabled = true;
  startBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 检测中...';
  startBtn.className = "w-full py-3 rounded-lg bg-gray-400 text-white text-sm font-medium flex items-center justify-center gap-2 cursor-not-allowed";

  tabCode.disabled = false;
  tabReport.disabled = true;
  tabCode.className = "px-3 py-1 rounded text-xs font-medium tab-active";
  tabReport.className = "px-3 py-1 rounded text-xs font-medium bg-gray-100 text-gray-400 cursor-not-allowed";

  fileNameDisplay.textContent = `检测中：${currentFileName} | ${tool}`;
  showContent("code");

  // 10秒模拟检测
  detectTimeout = setTimeout(() => {
    detectComplete(tool);
  }, 10000);
}

// 检测完成
function detectComplete(tool) {
  isDetecting = false;
  startBtn.innerHTML = '<i class="fa-solid fa-check"></i> 检测完成';
  startBtn.className = "w-full py-3 rounded-lg bg-gray-600 text-white text-sm font-medium flex items-center justify-center gap-2 cursor-not-allowed";

  tabCode.disabled = false;
  tabReport.disabled = false;
  tabCode.className = "px-3 py-1 rounded text-xs font-medium";
  tabReport.className = "px-3 py-1 rounded text-xs font-medium";
  tabCode.classList.add("tab-active");

  fileNameDisplay.textContent = `检测完成：reentrance.sol | ${tool}`;
}
// ======================
// Fetch 读取本地文件
// ======================
async function loadSourceCode() {
  try {
    const res = await fetch(FILE_PATH.sol);
    return await res.text();
  } catch (err) {
    return "加载源代码失败：请检查 text 文件夹是否存在文件";
  }
}

// 【精准匹配你的审计报告JSON】
async function loadReport() {
  try {
    const res = await fetch(FILE_PATH.json);
    const jsonData = await res.text();
    return JSON.parse(jsonData);
  } catch (err) {
    console.error("解析失败：", err);
    return { 
      success: false,
      error: "审计报告加载/解析失败",
      results: { detectors: [] }
    };
  }
}

// 【核心：审计报告可视化渲染】
async function showContent(type) {
  tabCode.classList.remove("tab-active");
  tabReport.classList.remove("tab-active");

  if (type === "code") {
    tabCode.classList.add("tab-active");
    reportContent.innerHTML = "加载源代码中...";
    const code = await loadSourceCode();
    reportContent.innerHTML = `<pre class="whitespace-pre-wrap text-sm">${code}</pre>`;
  } else {
    tabReport.classList.add("tab-active");
    reportContent.innerHTML = "加载审计报告中...";
    const data = await loadReport();

    // 渲染完整审计报告
    reportContent.innerHTML = `
    <div class="space-y-6 w-full">
      <!-- 报告顶部状态 -->
      // 找到这段代码（报告顶部状态）
<div class="p-4 rounded-lg border ${data.success ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}">
  <h3 class="text-lg font-bold flex items-center gap-2">
    ${data.success ? '✅ 审计完成' : '❌ 审计失败'}
  </h3>
  ${data.error ? `<p class="text-sm text-red-600 mt-1">${data.error}</p>` : ''}
  <p class="text-xs text-gray-500 mt-1">检测时间：${new Date().toLocaleString()}</p>
  
  <!-- 👇 新增：下载审计报告按钮（仅审计成功显示） -->
  ${data.success ? `
  <button onclick="downloadReport()" class="mt-3 px-3 py-1.5 bg-blue-600 text-white text-xs rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-1">
    <i class="fa-solid fa-download"></i> 下载审计报告
  </button>
  ` : ''}
</div>

      <!-- 漏洞/警告列表 -->
      <div class="space-y-4">
        <h4 class="font-semibold text-gray-800 text-md">🔍 检测结果（共 ${data.results?.detectors?.length || 0} 项）</h4>
        
        ${data.results?.detectors?.map((item, idx) => `
        <!-- 单个检测卡片 -->
        <div class="border rounded-lg overflow-hidden bg-white shadow-sm">
          <!-- 卡片头部：风险等级 + 检测类型 -->
          <div class="px-4 py-3 flex justify-between items-center border-b
            ${item.impact === 'High' ? 'bg-red-50 border-red-100' : 'bg-slate-50 border-slate-100'}">
            <div class="font-medium">
              ${item.check === 'reentrancy-eth' ? '重入漏洞' : 
                item.check === 'solc-version' ? '编译器版本' : 
                item.check === 'low-level-calls' ? '底层调用风险' : 
                item.check === 'naming-convention' ? '命名规范' : 
                item.check === 'redundant-statements' ? '冗余代码' : item.check}
            </div>
            <div class="flex gap-2">
              <span class="text-xs px-2 py-0.5 rounded-full font-medium border
                ${item.impact === 'High' ? 'bg-red-100 text-red-700 border-red-200' : 'bg-slate-100 text-slate-700 border-slate-200'}">
                ${item.impact}
              </span>
              <span class="text-xs px-2 py-0.5 rounded-full bg-blue-50 text-blue-700 border border-blue-200">
                ${item.confidence}
              </span>
            </div>
          </div>

          <!-- 核心描述 -->
          <div class="p-4 text-sm text-gray-700 whitespace-pre-line">
            ${item.description}
          </div>

          <!-- 代码位置 -->
          <div class="px-4 pb-2 text-xs text-gray-500">
            定位：${item.first_markdown_element || '全局'}
          </div>

          <!-- 关联代码元素（折叠面板） -->
          ${item.elements.length > 0 ? `
          <div class="px-4 pb-3">
            <button onclick="togglePanel(this)" class="text-xs text-blue-600 flex items-center gap-1">
              <i class="fa-solid fa-chevron-down text-xs"></i> 查看关联代码元素
            </button>
            <div class="hidden mt-2 p-3 bg-slate-50 rounded text-xs space-y-2">
              ${item.elements.map((el, i) => `
              <div class="border-b border-slate-200 pb-2 last:border-0 last:pb-0">
                <div><span class="text-gray-500">类型：</span>${el.type}</div>
                <div><span class="text-gray-500">名称：</span>${el.name}</div>
                <div><span class="text-gray-500">文件：</span>${el.source_mapping?.filename_short || '-'}</div>
                <div><span class="text-gray-500">行号：</span>${el.source_mapping?.lines?.join(',') || '-'}</div>
              </div>
              `).join('')}
            </div>
          </div>
          ` : ''}
        </div>
        `).join('')}
      </div>
    </div>
    `;
  }
}

// 折叠面板切换功能
function togglePanel(el) {
  const content = el.nextElementSibling;
  const icon = el.querySelector('i');
  content.classList.toggle('hidden');
  icon.className = content.classList.contains('hidden') 
    ? 'fa-solid fa-chevron-down text-xs' 
    : 'fa-solid fa-chevron-up text-xs';
  el.innerHTML = `${icon.outerHTML} ${content.classList.contains('hidden') ? '查看关联代码元素' : '收起代码元素'}`;
}

// 下载审计报告（JSON文件）
async function downloadReport() {
  try {
    // 1. 获取JSON文件内容
    const res = await fetch(FILE_PATH.json);
    const jsonText = await res.text();
    
    // 2. 创建Blob对象（JSON格式）
    const blob = new Blob([jsonText], { type: "application/json" });
    
    // 3. 创建下载链接
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "reentrance_audit_report.json"; // 下载文件名
    document.body.appendChild(a);
    
    // 4. 触发下载并清理
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (err) {
    alert("下载失败：" + err.message);
  }
}
</script>
